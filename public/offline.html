<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#003366">
    <title>Blue Knight Alumni Hub - Offline</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: linear-gradient(135deg, #003366 0%, #004488 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      
      .container {
        text-align: center;
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        max-width: 500px;
      }
      
      h1 {
        color: #003366;
        margin-bottom: 16px;
        font-size: 28px;
      }
      
      p {
        color: #666;
        line-height: 1.6;
        margin-bottom: 24px;
      }
      
      .icon {
        font-size: 64px;
        margin-bottom: 20px;
      }
      
      .status {
        background: #f5f5f5;
        padding: 16px;
        border-radius: 8px;
        color: #999;
        font-size: 14px;
        font-family: monospace;
      }
      
      button {
        background: #003366;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 16px;
        transition: background 0.3s;
      }
      
      button:hover {
        background: #004488;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📱</div>
      <h1>You're Offline</h1>
      <p>
        The Blue Knight Alumni Hub is currently unavailable because you're offline.
        The app will sync when your connection is restored.
      </p>
      <div class="status">
        Status: Waiting for network connection...
      </div>
      <button onclick="location.reload()">Try Again</button>
    </div>
    
    <script>
      // Listen for connection restoration
      window.addEventListener('online', () => {
        console.log('Connection restored!');
        location.reload();
      });
    </script>
  </body>
</html>
